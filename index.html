<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Etiquetas PWA (Para que Chrome sepa que es instalable) -->
    <meta name="theme-color" content="#1d4ed8">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    
    <title>Proyecto de Rutas Óptimas</title>
    
    <!-- Tailwind CSS para estilos rápidos y responsivos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS (Mapa) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Iconos Phosphor (Diseño limpio y moderno) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; background-color: #f3f4f6; }
        .leaflet-control-container .leaflet-top { z-index: 400; }
        .leaflet-control-container .leaflet-bottom { z-index: 400; }
        .sortable-ghost { opacity: 0.4; background-color: #eff6ff; }
        .sortable-drag { background-color: white; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); cursor: grabbing !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen w-screen font-sans text-gray-800">

    <!-- ÁREA DEL MAPA -->
    <div id="map" class="w-full h-[45%] md:h-full md:flex-1 order-1 md:order-2 relative z-0 border-b md:border-b-0 border-gray-300"></div>

    <!-- PANEL DE CONTROL -->
    <div id="sidebar" class="w-full md:w-[400px] h-[55%] md:h-full flex flex-col bg-white shadow-[0_-4px_10px_rgba(0,0,0,0.1)] md:shadow-[4px_0_10px_rgba(0,0,0,0.1)] order-2 md:order-1 relative z-10">
        
        <!-- Encabezado -->
        <div class="bg-blue-700 text-white px-4 py-3 shadow-md flex justify-between items-center shrink-0">
            <h1 class="text-lg font-bold flex items-center gap-2">
                <i class="ph ph-map-trifold text-2xl"></i> Rutas Óptimas
            </h1>
        </div>

        <!-- Buscador -->
        <div class="p-3 border-b bg-gray-50 shrink-0 relative">
            <div class="flex gap-2">
                <input type="text" id="search-input" placeholder="Buscar dirección..." 
                       class="flex-1 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm shadow-sm"
                       onkeypress="if(event.key === 'Enter') searchAddress()">
                <button onclick="searchAddress()" class="bg-blue-600 text-white px-4 rounded-lg hover:bg-blue-700 transition shadow-sm flex items-center justify-center">
                    <i class="ph ph-magnifying-glass text-xl"></i>
                </button>
            </div>
            <ul id="search-results" class="absolute left-3 right-3 top-[100%] mt-1 bg-white border border-gray-200 rounded-lg shadow-xl max-h-48 overflow-y-auto hidden z-50 divide-y divide-gray-100 text-sm"></ul>
        </div>

        <!-- Lista de Paradas -->
        <div class="flex-1 overflow-y-auto p-3 bg-white no-scrollbar">
            <div class="flex justify-between items-center mb-2 px-1">
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider">Tus Paradas (<span id="stop-count">0</span>)</h2>
                <button onclick="clearAll()" class="text-xs text-red-500 hover:text-red-700 flex items-center gap-1 font-medium">
                    <i class="ph ph-trash"></i> Borrar Todo
                </button>
            </div>
            <ul id="stops-list" class="space-y-2 pb-2"></ul>
            <div id="empty-state" class="text-center text-gray-400 py-10 px-4">
                <i class="ph ph-map-pin-line text-5xl mb-2 opacity-50"></i>
                <p class="text-sm font-medium">Aún no hay paradas.</p>
                <p class="text-xs mt-1">Busca una dirección arriba para comenzar.</p>
            </div>
        </div>

        <!-- Botones de Acción -->
        <div class="p-3 border-t bg-gray-50 shrink-0 shadow-[0_-5px_10px_rgba(0,0,0,0.02)]">
            <div id="stats-panel" class="hidden mb-3 bg-blue-50 border border-blue-200 p-3 rounded-lg shadow-inner">
                <div class="flex justify-between items-center text-blue-900 font-bold text-sm">
                    <span class="flex items-center gap-1.5"><i class="ph ph-clock text-lg text-blue-600"></i> <span id="time-est">--</span></span>
                    <span class="flex items-center gap-1.5"><i class="ph ph-car-profile text-lg text-blue-600"></i> <span id="dist-est">--</span></span>
                </div>
                <p class="text-[10px] text-blue-600/80 mt-1.5 text-center font-medium uppercase tracking-wide">+5 min incluidos por entrega</p>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-2">
                <button onclick="calculateRoute(false)" class="bg-gray-800 text-white py-2.5 px-2 rounded-lg text-xs md:text-sm font-semibold hover:bg-gray-900 transition flex items-center justify-center gap-1.5 shadow-sm">
                    <i class="ph ph-list-numbers text-lg"></i> Ruta Manual
                </button>
                <button onclick="calculateRoute(true)" class="bg-blue-600 text-white py-2.5 px-2 rounded-lg text-xs md:text-sm font-semibold hover:bg-blue-700 transition flex items-center justify-center gap-1.5 shadow-sm">
                    <i class="ph ph-magic-wand text-lg"></i> Optimizar
                </button>
            </div>
            <button id="btn-export" onclick="exportToGoogleMaps()" disabled class="w-full bg-[#1da462] text-white py-3 rounded-lg text-sm font-bold hover:bg-[#15874f] transition disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2 shadow-md">
                <i class="ph ph-google-logo text-xl"></i> Navegar en Google Maps
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script>
        // --- Registro de Service Worker para PWA (Instalación) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrado', reg))
                    .catch(err => console.error('Error al registrar SW', err));
            });
        }

        // Variables globales
        let map;
        let stops = [];
        let markers = [];
        let routePolyline = null;
        const SECONDS_PER_DELIVERY = 300; 

        document.addEventListener('DOMContentLoaded', () => {
            map = L.map('map', { zoomControl: false }).setView([40.4168, -3.7038], 12); 
            L.control.zoom({ position: 'topright' }).addTo(map);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            new Sortable(document.getElementById('stops-list'), {
                animation: 150,
                handle: '.drag-handle',
                ghostClass: 'sortable-ghost',
                dragClass: 'sortable-drag',
                onEnd: function () {
                    const newOrder = [];
                    document.querySelectorAll('#stops-list li').forEach(li => {
                        const id = li.dataset.id;
                        const stop = stops.find(s => s.id === id);
                        if(stop) newOrder.push(stop);
                    });
                    stops = newOrder;
                    updateMapMarkers(); 
                    clearRoute(); 
                }
            });

            setTimeout(() => { map.invalidateSize(); }, 500);
            window.addEventListener('resize', () => { map.invalidateSize(); });
        });

        async function searchAddress() {
            const query = document.getElementById('search-input').value;
            if (!query) return;
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                showSearchResults(data);
            } catch (error) {
                alert("Error al buscar la dirección.");
            }
        }

        function showSearchResults(results) {
            const resultsList = document.getElementById('search-results');
            resultsList.innerHTML = '';
            if (results.length === 0) {
                resultsList.innerHTML = '<li class="p-3 text-gray-500">No se encontraron resultados</li>';
            } else {
                results.forEach(place => {
                    const li = document.createElement('li');
                    li.className = 'p-3 hover:bg-blue-50 cursor-pointer flex items-start gap-2 transition';
                    li.innerHTML = `<i class="ph ph-map-pin text-blue-500 mt-0.5"></i> <span>${place.display_name}</span>`;
                    li.onclick = () => addStop(place);
                    resultsList.appendChild(li);
                });
            }
            resultsList.classList.remove('hidden');
        }

        document.addEventListener('click', (e) => {
            if(!e.target.closest('.relative')) {
                document.getElementById('search-results').classList.add('hidden');
            }
        });

        function addStop(place) {
            const id = Date.now().toString();
            const shortName = place.display_name.split(',').slice(0, 2).join(', ');
            
            stops.push({
                id: id,
                name: shortName,
                fullName: place.display_name,
                lat: parseFloat(place.lat),
                lon: parseFloat(place.lon)
            });

            document.getElementById('search-input').value = '';
            document.getElementById('search-results').classList.add('hidden');
            
            renderList();
            updateMapMarkers();
            clearRoute();
            map.setView([parseFloat(place.lat), parseFloat(place.lon)], 14);
        }

        function renderList() {
            const list = document.getElementById('stops-list');
            const emptyState = document.getElementById('empty-state');
            const btnExport = document.getElementById('btn-export');
            
            list.innerHTML = '';
            document.getElementById('stop-count').textContent = stops.length;

            if (stops.length === 0) {
                emptyState.classList.remove('hidden');
                btnExport.disabled = true;
                return;
            }

            emptyState.classList.add('hidden');
            btnExport.disabled = (stops.length < 2);

            stops.forEach((stop, index) => {
                const li = document.createElement('li');
                li.dataset.id = stop.id;
                li.className = 'bg-white border border-gray-200 rounded-lg p-2.5 shadow-sm flex justify-between items-center gap-2 group';
                
                const isOrigin = index === 0;
                const badgeColor = isOrigin ? 'bg-red-100 text-red-700 border-red-200' : 'bg-blue-100 text-blue-700 border-blue-200';
                
                li.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <button class="drag-handle text-gray-400 hover:text-gray-600 touch-manipulation p-1">
                            <i class="ph ph-list text-xl"></i>
                        </button>
                        <div class="flex flex-col min-w-0">
                            <div class="flex items-center gap-1.5 mb-0.5">
                                <span class="text-[10px] font-bold border px-1.5 py-0.5 rounded-sm ${badgeColor}">
                                    ${isOrigin ? 'ORIGEN' : 'PARADA ' + index}
                                </span>
                            </div>
                            <span class="font-medium text-sm text-gray-800 truncate">${stop.name}</span>
                        </div>
                    </div>
                    <button onclick="removeStop('${stop.id}')" class="text-gray-400 hover:text-red-500 transition p-2 shrink-0 rounded-full hover:bg-red-50">
                        <i class="ph ph-trash text-lg"></i>
                    </button>
                `;
                list.appendChild(li);
            });
        }

        function removeStop(id) {
            stops = stops.filter(s => s.id !== id);
            renderList();
            updateMapMarkers();
            clearRoute();
        }

        function clearAll() {
            if(confirm("¿Estás seguro de borrar todas las paradas?")) {
                stops = [];
                renderList();
                updateMapMarkers();
                clearRoute();
                document.getElementById('stats-panel').classList.add('hidden');
            }
        }

        function updateMapMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            if (stops.length === 0) return;
            const bounds = L.latLngBounds();

            stops.forEach((stop, index) => {
                const isOrigin = index === 0;
                const color = isOrigin ? '#ef4444' : '#3b82f6'; 
                
                const html = `
                    <div style="background-color: ${color}; color: white; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; border: 2px solid white; box-shadow: 0 3px 6px rgba(0,0,0,0.3);">
                        ${index === 0 ? '<i class="ph ph-flag-checkered"></i>' : index}
                    </div>
                `;

                const customIcon = L.divIcon({ className: 'custom-div-icon', html: html, iconSize: [28, 28], iconAnchor: [14, 14] });
                const marker = L.marker([stop.lat, stop.lon], { icon: customIcon }).addTo(map);
                marker.bindPopup(`<b>${index === 0 ? 'Origen' : 'Parada ' + index}</b><br>${stop.name}`);
                markers.push(marker);
                bounds.extend([stop.lat, stop.lon]);
            });

            if (stops.length > 1) { map.fitBounds(bounds, { padding: [40, 40] }); }
        }

        function clearRoute() {
            if (routePolyline) map.removeLayer(routePolyline);
            document.getElementById('stats-panel').classList.add('hidden');
        }

        async function calculateRoute(optimize) {
            if (stops.length < 2) {
                alert("Necesitas al menos 2 paradas para calcular una ruta.");
                return;
            }

            const coordsString = stops.map(s => `${s.lon},${s.lat}`).join(';');
            let url = optimize 
                ? `https://router.project-osrm.org/trip/v1/driving/${coordsString}?source=first&destination=any&roundtrip=false&overview=full&geometries=geojson`
                : `https://router.project-osrm.org/route/v1/driving/${coordsString}?overview=full&geometries=geojson`;

            try {
                const btnIcon = optimize ? '.ph-magic-wand' : '.ph-list-numbers';
                document.querySelector(btnIcon).classList.add('animate-spin');

                const response = await fetch(url);
                const data = await response.json();

                document.querySelector(btnIcon).classList.remove('animate-spin');

                if (data.code !== 'Ok') {
                    alert("No se pudo calcular la ruta. Comprueba que los puntos sean accesibles por coche.");
                    return;
                }

                if (optimize && data.waypoints) {
                    const optimizedStops = [];
                    const sortedWaypoints = data.waypoints.sort((a, b) => a.waypoint_index - b.waypoint_index);
                    sortedWaypoints.forEach(wp => {
                        const originalStopIndex = data.waypoints.indexOf(wp);
                        optimizedStops.push(stops[originalStopIndex]);
                    });
                    stops = optimizedStops;
                    renderList();
                    updateMapMarkers();
                }

                clearRoute();
                const routeGeom = optimize ? data.trips[0].geometry : data.routes[0].geometry;
                const latLngs = routeGeom.coordinates.map(c => [c[1], c[0]]);
                
                routePolyline = L.polyline(latLngs, { color: '#3b82f6', weight: 6, opacity: 0.8, lineJoin: 'round' }).addTo(map);
                map.fitBounds(routePolyline.getBounds(), { padding: [30, 30] });

                const routeData = optimize ? data.trips[0] : data.routes[0];
                showStats(routeData.duration, routeData.distance);

            } catch (error) {
                alert("Error de conexión al servidor de rutas.");
                document.querySelectorAll('.animate-spin').forEach(el => el.classList.remove('animate-spin'));
            }
        }

        function showStats(durationSecs, distanceMeters) {
            const drivingMins = Math.round(durationSecs / 60);
            const dropStops = stops.length > 1 ? stops.length - 1 : 0;
            const dropMins = Math.round((dropStops * SECONDS_PER_DELIVERY) / 60);
            const totalMins = drivingMins + dropMins;
            const distKm = (distanceMeters / 1000).toFixed(1);

            let timeText = "";
            if (totalMins >= 60) {
                const h = Math.floor(totalMins / 60);
                const m = totalMins % 60;
                timeText = `${h}h ${m}m`;
            } else {
                timeText = `${totalMins} min`;
            }

            document.getElementById('time-est').textContent = timeText;
            document.getElementById('dist-est').textContent = `${distKm} km`;
            document.getElementById('stats-panel').classList.remove('hidden');
        }

        function exportToGoogleMaps() {
            if (stops.length < 2) return;
            if (stops.length > 10) { alert("Google Maps solo permite un máximo de 9-10 paradas por viaje."); }

            const origin = `${stops[0].lat},${stops[0].lon}`;
            const destination = `${stops[stops.length - 1].lat},${stops[stops.length - 1].lon}`;
            let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=driving`;

            if (stops.length > 2) {
                const waypoints = stops.slice(1, -1).map(s => `${s.lat},${s.lon}`).join('|');
                url += `&waypoints=${waypoints}`;
            }
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
